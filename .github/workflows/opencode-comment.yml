name: opencode-comment

on:
  issue_comment:
    types: [created]

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Only run when:
    # 1. The comment is on a pull request (not a plain issue)
    # 2. The comment contains /oc or /opencode
    # 3. The commenter is the owner, a member, or a collaborator — not a random fork opener
    if: |
      github.event.issue.pull_request != null &&
      (contains(github.event.comment.body, '/oc') || contains(github.event.comment.body, '/opencode')) &&
      (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR'
      )

    permissions:
      id-token: write
      contents: read
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: anomalyco/opencode/github@latest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: anthropic/claude-haiku-4-5
          use_github_token: true
          share: false
